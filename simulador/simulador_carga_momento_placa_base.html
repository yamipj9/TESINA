<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Simulador de Excentricidad en Placa Base</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --panel-bg: #f8f9fa;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-blue: #1565c0;
            --accent-red: #c62828;
            --accent-orange: #e65100;
            --border-color: #dee2e6;
            --steel-color: #546e7a;
            --concrete-color: #37474f;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            color: var(--text-main);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--accent-orange);
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-orange);
            margin-bottom: 5px;
        }

        .val-display {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
        }

        .results {
            background-color: rgba(0,0,0,0.04);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent-blue);
            transition: border-color 0.3s ease;
        }

        .results.tension {
            border-left-color: var(--accent-red);
        }

        .result-item {
            font-size: 1.1rem;
        }

        .result-item span {
            font-weight: bold;
        }

        canvas {
            background-color: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
            display: block;
            margin-bottom: 15px;
        }

        .legend {
            display: flex;
            justify-content: space-around;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Simulador de Flexocompresión en Placa Base</h2>
        
        <div class="controls">
            <div class="control-group">
                <label for="sliderP">Carga Axial P (Toneladas)</label>
                <input type="range" id="sliderP" min="1" max="100" value="50" step="1">
                <div class="val-display"><span id="valP">50</span> Ton</div>
            </div>
            
            <div class="control-group">
                <label for="sliderM">Momento Flexionante M (Ton-m)</label>
                <input type="range" id="sliderM" min="0" max="50" value="5" step="0.5">
                <div class="val-display"><span id="valM">5.0</span> Ton-m</div>
            </div>
        </div>

        <div class="results" id="resultsPanel">
            <div class="result-item">Excentricidad Real (e): <span id="valE">10.00</span> cm</div>
            <div class="result-item" id="statusText">Estado: Todo a compresión</div>
        </div>

        <canvas id="simCanvas" width="740" height="400"></canvas>

        <div class="legend">
            <div class="legend-item"><div class="color-box" style="background: rgba(21,101,192,0.18); border:1px solid #1565c0;"></div> Bloque de Compresión</div>
            <div class="legend-item"><div class="color-box" style="background: #c62828;"></div> Ancla en Tensión</div>
            <div class="legend-item"><div class="color-box" style="background: #e65100;"></div> Cargas (P y M)</div>
            <div class="legend-item"><div class="color-box" style="background: #546e7a;"></div> Acero (Placa/Columna)</div>
        </div>
    </div>

    <script>
        // Referencias del DOM
        const sliderP = document.getElementById('sliderP');
        const sliderM = document.getElementById('sliderM');
        const valP = document.getElementById('valP');
        const valM = document.getElementById('valM');
        const valE = document.getElementById('valE');
        const statusText = document.getElementById('statusText');
        const resultsPanel = document.getElementById('resultsPanel');
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // Constantes del modelo estructural
        const E_CRIT = 15; // Excentricidad crítica teórica en cm
        const BRAZO_PALANCA = 30; // Distancia entre centroide de compresión y ancla a tensión (cm)

        function drawSimulator() {
            // Valores actuales de los sliders
            const P = parseFloat(sliderP.value);
            const M = parseFloat(sliderM.value);
            
            // Cálculos estructurales básicos
            const e = (M * 100) / P; // Excentricidad en cm
            let isTension = e > E_CRIT;
            
            // Fuerza de tensión aproximada para visualización (Estática básica sumando momentos)
            // T = (M*100 - P*e_crit) / Brazo de palanca
            let T = 0;
            if (isTension) {
                T = (M * 100 - P * E_CRIT) / BRAZO_PALANCA;
                if (T < 0) T = 0;
            }

            // Actualizar textos de la interfaz
            valP.innerText = P.toFixed(1);
            valM.innerText = M.toFixed(1);
            valE.innerText = e.toFixed(2);
            
            if (isTension) {
                statusText.innerHTML = `Estado: <b>Excentricidad Grande (Anclas en Tensión)</b>`;
                resultsPanel.classList.add('tension');
            } else {
                statusText.innerHTML = `Estado: <b>Excentricidad Pequeña (Todo a compresión)</b>`;
                resultsPanel.classList.remove('tension');
            }

            // LIMPIAR LIENZO
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // VARIABLES DE DIBUJO
            const cx = canvas.width / 2;
            const cy = 250; // Nivel de la interfaz de la placa
            
            // Dibujar Dado de Concreto
            ctx.fillStyle = "#b0bec5";
            ctx.fillRect(cx - 150, cy, 300, 150);
            // Sombreado superior del dado
            ctx.fillStyle = "#90a4ae";
            ctx.fillRect(cx - 150, cy, 300, 10);

            // Calcular rotación si hay levantamiento
            // El punto de giro (pivote) lo ubicamos en el borde derecho de compresión (aprox cx + 80)
            const pivotX = cx + 80;
            const pivotY = cy;
            // Un ángulo visual leve proporcional a la excentricidad excedente (tope en 5 grados)
            let rotationAngle = isTension ? Math.min((e - E_CRIT) * 0.002, 0.08) : 0;

            // GUARDAR ESTADO PARA ROTACIÓN (Conjunto Placa + Columna)
            ctx.save();
            ctx.translate(pivotX, pivotY);
            ctx.rotate(rotationAngle);
            ctx.translate(-pivotX, -pivotY);

            // 1. Dibujar Placa Base
            ctx.fillStyle = "#607d8b";
            const plateWidth = 200;
            const plateThick = 15;
            ctx.fillRect(cx - plateWidth/2, cy - plateThick, plateWidth, plateThick);
            
            // 2. Dibujar Columna (Perfil W simplificado)
            ctx.fillStyle = "#546e7a";
            ctx.fillRect(cx - 40, cy - plateThick - 150, 80, 150);
            ctx.fillStyle = "#78909c"; // Patines
            ctx.fillRect(cx - 50, cy - plateThick - 150, 10, 150); // Izquierdo
            ctx.fillRect(cx + 40, cy - plateThick - 150, 10, 150); // Derecho

            // 3. Flecha de Carga Axial (P)
            drawArrow(ctx, cx, cy - 230, cx, cy - plateThick - 150, "#e65100", 3);
            ctx.fillStyle = "#e65100";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(`P = ${P} Ton`, cx, cy - 240);

            // 4. Flecha de Momento Flexionante (M)
            ctx.beginPath();
            ctx.arc(cx, cy - 100, 70, 1.2 * Math.PI, 1.8 * Math.PI);
            ctx.strokeStyle = "#e65100";
            ctx.lineWidth = 3;
            ctx.stroke();
            // Punta de flecha del momento
            drawPolygon(ctx, [[cx+60, cy-140], [cx+75, cy-145], [cx+68, cy-130]], "#e65100");
            ctx.fillText(`M = ${M} Ton-m`, cx + 80, cy - 160);

            // RESTAURAR ESTADO (Quitar rotación para dibujar anclas y presiones fijas al dado)
            ctx.restore();

            // 5. Dibujar Anclas
            const anchorDepth = 100;
            // Ancla Derecha (Siempre a compresión o inactiva visualmente)
            ctx.fillStyle = "#37474f";
            ctx.fillRect(cx + 70, cy - 20, 8, anchorDepth + 20);
            // Tuerca
            ctx.fillRect(cx + 66, cy - 25, 16, 8);

            // Ancla Izquierda (Dinámica: Gris si está inactiva, Roja si está en tensión)
            ctx.fillStyle = isTension ? "#c62828" : "#37474f";
            ctx.fillRect(cx - 78, cy - 20 - (Math.sin(rotationAngle)*150), 8, anchorDepth + 20);
            // Tuerca que sube con la placa
            ctx.fillRect(cx - 82, cy - 25 - (Math.sin(rotationAngle)*150), 16, 8);

            // 6. Fuerza de Tensión (Vector visual en ancla izquierda)
            if (isTension) {
                const arrStartX = cx - 74;
                const arrStartY = cy - 40 - (Math.sin(rotationAngle)*150);
                drawArrow(ctx, arrStartX, arrStartY, arrStartX, arrStartY - 40, "#c62828", 3);
                ctx.fillStyle = "#c62828";
                ctx.textAlign = "right";
                ctx.fillText(`T = ${T.toFixed(1)} Ton`, arrStartX - 10, arrStartY - 15);
            }

            // 7. Bloque de Compresión (Azul bajo la placa)
            ctx.fillStyle = "rgba(21, 101, 192, 0.18)";
            ctx.strokeStyle = "#1565c0";
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            if (!isTension) {
                // Presión en toda la placa (Trapecio)
                // Mientras más excentricidad, más cargado a la derecha
                let leftPres = 50 - (e * 3); 
                let rightPres = 50 + (e * 3);
                ctx.moveTo(cx - 100, cy);
                ctx.lineTo(cx + 100, cy);
                ctx.lineTo(cx + 100, cy + rightPres);
                ctx.lineTo(cx - 100, cy + Math.max(leftPres, 0));
            } else {
                // Presión triangular solo en el extremo derecho
                // El ancho de compresión disminuye al aumentar e
                let compresionWidth = 100 - ((e - E_CRIT) * 2); 
                if (compresionWidth < 20) compresionWidth = 20; // Tope visual
                
                ctx.moveTo(cx + 100 - compresionWidth, cy);
                ctx.lineTo(cx + 100, cy);
                ctx.lineTo(cx + 100, cy + 80); // Presión máxima intensa
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        // Utilidad para dibujar flechas rectas
        function drawArrow(ctx, fromx, fromy, tox, toy, color, width) {
            const headlen = 10;
            const dx = tox - fromx;
            const dy = toy - fromy;
            const angle = Math.atan2(dy, dx);
            
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.beginPath();
            ctx.moveTo(fromx, fromy);
            ctx.lineTo(tox, toy);
            ctx.stroke();
            
            // Punta
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.moveTo(tox, toy);
            ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
            ctx.fill();
        }

        // Utilidad para dibujar polígonos
        function drawPolygon(ctx, points, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(points[0][0], points[0][1]);
            for(let i=1; i<points.length; i++){
                ctx.lineTo(points[i][0], points[i][1]);
            }
            ctx.closePath();
            ctx.fill();
        }

        // Listeners de eventos
        sliderP.addEventListener('input', drawSimulator);
        sliderM.addEventListener('input', drawSimulator);

        // Inicializar
        drawSimulator();

    </script>
</body>
</html>
